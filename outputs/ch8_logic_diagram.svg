<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="1320" viewBox="0 0 1700 1320">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#263238"/>
    </marker>
    <style>
      text {
        font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif;
        fill: #17212b;
      }
      .page {
        fill: #f8fafc;
      }
      .panel {
        fill: #ffffff;
        stroke: #d8dee6;
        stroke-width: 2;
        rx: 14;
      }
      .title {
        font-size: 36px;
        font-weight: 700;
      }
      .subtitle {
        font-size: 18px;
        fill: #5a6875;
      }
      .section {
        font-size: 26px;
        font-weight: 700;
      }
      .box {
        fill: #ffffff;
        stroke: #263238;
        stroke-width: 2;
        rx: 8;
      }
      .power {
        fill: #fff7e6;
        stroke: #b36b00;
      }
      .logic {
        fill: #eef7ff;
        stroke: #1565c0;
      }
      .io {
        fill: #eef9f0;
        stroke: #2e7d32;
      }
      .warn {
        fill: #fff1f1;
        stroke: #c62828;
      }
      .note {
        fill: #f5f7fa;
        stroke: #c6ccd4;
      }
      .label {
        font-size: 20px;
        font-weight: 700;
      }
      .small {
        font-size: 17px;
      }
      .muted {
        font-size: 15px;
        fill: #5a6875;
      }
      .line {
        stroke: #263238;
        stroke-width: 2.5;
        fill: none;
        marker-end: url(#arrow);
      }
      .thin {
        stroke-width: 2;
      }
      .dashed {
        stroke-dasharray: 8 7;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1700" height="1320" class="page"/>

  <text x="60" y="70" class="title">CH8 整板逻辑图</text>
  <text x="60" y="102" class="subtitle">按功能模块理解：电源先建立，MCU 控制通道选择，采集模块读数，再通过 Zigbee / RS485 通信。</text>

  <rect x="50" y="130" width="1600" height="570" class="panel"/>
  <text x="80" y="178" class="section">一、电源结构</text>

  <rect x="90" y="220" width="140" height="76" class="box power"/>
  <text x="160" y="250" text-anchor="middle" class="label">P24V</text>
  <text x="160" y="276" text-anchor="middle" class="small">24V 输入</text>

  <rect x="285" y="220" width="150" height="76" class="box power"/>
  <text x="360" y="250" text-anchor="middle" class="label">F1 / D2</text>
  <text x="360" y="276" text-anchor="middle" class="small">保险 / TVS</text>

  <rect x="500" y="205" width="180" height="106" class="box power"/>
  <text x="590" y="238" text-anchor="middle" class="label">U23 LGS5148</text>
  <text x="590" y="266" text-anchor="middle" class="small">24V 降压</text>
  <text x="590" y="288" text-anchor="middle" class="muted">48V / 600mA</text>

  <rect x="745" y="220" width="160" height="76" class="box power"/>
  <text x="825" y="250" text-anchor="middle" class="label">24VT5V5</text>
  <text x="825" y="276" text-anchor="middle" class="small">约 5.5V</text>

  <rect x="965" y="220" width="145" height="76" class="box power"/>
  <text x="1038" y="250" text-anchor="middle" class="label">Q7</text>
  <text x="1038" y="276" text-anchor="middle" class="small">电源开关</text>

  <rect x="1170" y="220" width="135" height="76" class="box power"/>
  <text x="1238" y="250" text-anchor="middle" class="label">5V5</text>
  <text x="1238" y="276" text-anchor="middle" class="small">后级母线</text>

  <path class="line" d="M230 258 H285"/>
  <path class="line" d="M435 258 H500"/>
  <path class="line" d="M680 258 H745"/>
  <path class="line" d="M905 258 H965"/>
  <path class="line" d="M1110 258 H1170"/>

  <rect x="90" y="390" width="140" height="76" class="box power"/>
  <text x="160" y="420" text-anchor="middle" class="label">P5V</text>
  <text x="160" y="446" text-anchor="middle" class="small">5V 充电输入</text>

  <rect x="285" y="378" width="180" height="100" class="box power"/>
  <text x="375" y="412" text-anchor="middle" class="label">U24 TP4057</text>
  <text x="375" y="439" text-anchor="middle" class="small">单节锂电充电</text>
  <text x="375" y="462" text-anchor="middle" class="muted">接电池端 BAT</text>

  <rect x="525" y="390" width="150" height="76" class="box warn"/>
  <text x="600" y="420" text-anchor="middle" class="label">B+</text>
  <text x="600" y="446" text-anchor="middle" class="small">3.0~4.2V</text>

  <path class="line" d="M230 428 H285"/>
  <path class="line" d="M465 428 H525"/>

  <rect x="90" y="545" width="140" height="76" class="box power"/>
  <text x="160" y="575" text-anchor="middle" class="label">PWR</text>
  <text x="160" y="601" text-anchor="middle" class="small">升压输入</text>

  <rect x="285" y="533" width="180" height="100" class="box power"/>
  <text x="375" y="567" text-anchor="middle" class="label">U25 MT3608</text>
  <text x="375" y="594" text-anchor="middle" class="small">升压电路</text>

  <rect x="525" y="545" width="150" height="76" class="box power"/>
  <text x="600" y="575" text-anchor="middle" class="label">BATT5V</text>
  <text x="600" y="601" text-anchor="middle" class="small">升压输出</text>

  <rect x="735" y="545" width="135" height="76" class="box power"/>
  <text x="803" y="575" text-anchor="middle" class="label">Q6</text>
  <text x="803" y="601" text-anchor="middle" class="small">电源选择</text>

  <path class="line" d="M230 583 H285"/>
  <path class="line" d="M465 583 H525"/>
  <path class="line" d="M675 583 H735"/>
  <path class="line dashed" d="M870 583 H1130 V296 H1170"/>
  <text x="995" y="568" text-anchor="middle" class="muted">备用/升压路径接入 5V5</text>

  <path class="line thin" d="M1238 296 V350"/>
  <path class="line thin" d="M1238 350 H1325"/>
  <rect x="1325" y="322" width="170" height="76" class="box power"/>
  <text x="1410" y="352" text-anchor="middle" class="label">U13 XC6206</text>
  <text x="1410" y="378" text-anchor="middle" class="small">5V / LDO5V</text>
  <rect x="1520" y="322" width="95" height="76" class="box io"/>
  <text x="1568" y="352" text-anchor="middle" class="label">U8</text>
  <text x="1568" y="378" text-anchor="middle" class="small">采集</text>
  <path class="line thin" d="M1495 360 H1520"/>

  <path class="line thin" d="M1238 350 V455 H1325"/>
  <rect x="1325" y="427" width="170" height="76" class="box power"/>
  <text x="1410" y="457" text-anchor="middle" class="label">U1 XC6204</text>
  <text x="1410" y="483" text-anchor="middle" class="small">+3V3</text>

  <path class="line thin" d="M1238 455 V555 H1325"/>
  <rect x="1325" y="527" width="170" height="76" class="box power"/>
  <text x="1410" y="557" text-anchor="middle" class="label">U12 XC6204</text>
  <text x="1410" y="583" text-anchor="middle" class="small">3.3V</text>

  <path class="line thin" d="M1238 555 V640 H1325"/>
  <rect x="1325" y="612" width="170" height="76" class="box power"/>
  <text x="1410" y="642" text-anchor="middle" class="label">U11 XC6210</text>
  <text x="1410" y="668" text-anchor="middle" class="small">VZIGBEE</text>
  <rect x="1520" y="612" width="95" height="76" class="box logic"/>
  <text x="1568" y="642" text-anchor="middle" class="label">U14</text>
  <text x="1568" y="668" text-anchor="middle" class="small">Zigbee</text>
  <path class="line thin" d="M1495 650 H1520"/>

  <rect x="50" y="740" width="1600" height="470" class="panel"/>
  <text x="80" y="788" class="section">二、采集与通信逻辑</text>

  <rect x="90" y="875" width="170" height="92" class="box io"/>
  <text x="175" y="910" text-anchor="middle" class="label">CH1 ~ CH8</text>
  <text x="175" y="939" text-anchor="middle" class="small">传感器接口</text>

  <rect x="335" y="858" width="220" height="126" class="box io"/>
  <text x="445" y="894" text-anchor="middle" class="label">固态继电器阵列</text>
  <text x="445" y="925" text-anchor="middle" class="small">U15~U22</text>
  <text x="445" y="951" text-anchor="middle" class="small">U26~U33</text>

  <rect x="635" y="875" width="175" height="92" class="box io"/>
  <text x="723" y="910" text-anchor="middle" class="label">U8 VW101</text>
  <text x="723" y="939" text-anchor="middle" class="small">振弦采集</text>

  <rect x="900" y="858" width="220" height="126" class="box logic"/>
  <text x="1010" y="894" text-anchor="middle" class="label">U5 STM32L051</text>
  <text x="1010" y="925" text-anchor="middle" class="small">主控 MCU</text>
  <text x="1010" y="951" text-anchor="middle" class="small">选通 / 采集 / 通信</text>

  <path class="line" d="M260 921 H335"/>
  <path class="line" d="M555 921 H635"/>
  <path class="line" d="M810 901 C845 875 865 875 900 901"/>
  <path class="line" d="M900 943 C865 970 845 970 810 943"/>

  <path class="line dashed" d="M1010 858 V820 H445 V858"/>
  <text x="730" y="813" text-anchor="middle" class="muted">MCU 控制继电器，决定当前接入哪一路传感器</text>

  <rect x="1240" y="815" width="170" height="78" class="box logic"/>
  <text x="1325" y="846" text-anchor="middle" class="label">U6 SP3485</text>
  <text x="1325" y="872" text-anchor="middle" class="small">RS485 收发</text>

  <rect x="1460" y="815" width="120" height="78" class="box io"/>
  <text x="1520" y="846" text-anchor="middle" class="label">J1</text>
  <text x="1520" y="872" text-anchor="middle" class="small">RS485</text>

  <rect x="1240" y="930" width="170" height="78" class="box logic"/>
  <text x="1325" y="961" text-anchor="middle" class="label">U14 Zigbee</text>
  <text x="1325" y="987" text-anchor="middle" class="small">UART1 无线</text>

  <rect x="1240" y="1045" width="170" height="78" class="box io"/>
  <text x="1325" y="1076" text-anchor="middle" class="label">SWD1</text>
  <text x="1325" y="1102" text-anchor="middle" class="small">下载 / 调试</text>

  <path class="line" d="M1120 880 H1240"/>
  <path class="line" d="M1410 854 H1460"/>
  <path class="line" d="M1120 923 H1190 V969 H1240"/>
  <path class="line" d="M1120 966 H1170 V1084 H1240"/>

  <rect x="90" y="1035" width="900" height="115" class="box note"/>
  <text x="120" y="1074" class="label">读图顺序</text>
  <text x="120" y="1110" class="small">P24V 经 U23 得到 24VT5V5，再形成 5V5；5V5 分出 5V、3.3V、Zigbee 电源。</text>
  <text x="120" y="1140" class="small">STM32 选通 CH1~CH8 的继电器阵列，U8 采集，最后由 Zigbee 或 RS485 发出。</text>

</svg>
